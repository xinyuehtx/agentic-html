<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProductX - 让效率翻倍</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #333; }
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      text-align: center;
    }
    .hero h1 { font-size: 3rem; margin-bottom: 16px; color: #1a73e8; }
    .hero .subtitle { font-size: 1.25rem; opacity: 0.9; margin-bottom: 40px; }
    .hero .cta-button {
      display: inline-block;
      padding: 14px 36px;
      background: #fff;
      color: #764ba2;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 8px;
      text-decoration: none;
      transition: transform 0.2s;
    }
    .hero .cta-button:hover { transform: translateY(-2px); }
    .features {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 32px;
      padding: 60px 40px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .feature-card { text-align: center; padding: 24px; }
    .feature-card img { width: 64px; height: 64px; margin-bottom: 16px; }
    .feature-card h3 { margin-bottom: 8px; }
    .feature-card p { color: #666; line-height: 1.6; }
  </style>
</head>
<body>
  <section class="hero">
    <h1>ProductX - 让效率翻倍</h1>
    <p class="subtitle">智能工作流引擎，帮助团队快速交付高质量产品</p>
    <a href="#signup" class="cta-button">免费试用</a>
  </section>
  <section class="features">
    <div class="feature-card">
      <img src="https://via.placeholder.com/64" alt="自动化">
      <h3>智能自动化</h3>
      <p>AI 驱动的工作流自动化，减少重复劳动</p>
    </div>
    <div class="feature-card">
      <img src="https://via.placeholder.com/64" alt="协作">
      <h3>实时协作</h3>
      <p>团队成员实时协作，沟通零延迟</p>
    </div>
    <div class="feature-card">
      <img src="https://via.placeholder.com/64" alt="分析">
      <h3>数据洞察</h3>
      <p>可视化数据面板，一目了然掌握进度</p>
    </div>
  </section>
</body>
</html>
